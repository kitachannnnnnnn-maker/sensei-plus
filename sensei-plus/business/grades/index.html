<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生徒日誌</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- メイン画面（認証済みのみ表示） -->
    <div id="main-screen" class="main-screen">
        <div class="container">
            <header>
                <div class="header-left">
                    <h1>📔 生徒日誌</h1>
                    <p>その日の生徒の様子を記録</p>
                </div>
                <div class="header-right">
                    <span id="current-teacher" class="teacher-info">教員: <span id="teacher-name">-</span></span>
                    <button class="btn btn-logout" onclick="handleLogout()">ログアウト</button>
                </div>
            </header>

            <main>
                <!-- 入力セクション -->
                <div class="input-section">
                    <h2>記録を追加</h2>
                    <div class="form-group">
                        <label for="student-id">出席番号 / イニシャル</label>
                        <input type="text" id="student-id" placeholder="例：3番 または A.Y">
                    </div>
                    <div class="form-group">
                        <label for="category">カテゴリ</label>
                        <select id="category">
                            <option value="good">✨ 良いこと</option>
                            <option value="guidance">📢 指導</option>
                            <option value="other">📝 その他</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="memo">メモ内容</label>
                        <textarea id="memo" placeholder="子どもの様子や出来事など"></textarea>
                    </div>
                    <button class="btn btn-primary" onclick="addRecordWithSync()">記録</button>
                </div>

                <!-- 記録一覧 -->
                <div class="record-list">
                    <h2>本日の記録</h2>
                    <div id="records-container" class="records-container"></div>
                </div>

                <!-- 操作 -->
                <div class="actions">
                    <button class="btn" onclick="exportData()">📥 エクスポート</button>
                    <button class="btn btn-danger" onclick="clearData()">🗑️ リセット</button>
                </div>
            </main>
        </div>
    </div>

    <!-- 認証チェック -->
    <script src="../../homepage/auth.js"></script>
    <script>
        // ページ読み込み時に認証をチェック
        window.addEventListener('load', () => {
            if (!checkAuth()) {
                return; // 認証失敗 → リダイレクト処理へ
            }

            const teacherId = getTeacherId();
            currentTeacher = teacherId;
            sessionStorage.setItem('currentTeacher', teacherId);
            document.getElementById('teacher-name').textContent = teacherId;
            loadTeacherData();
            renderRecords();
        });
    </script>
    <!-- Google Sheets 設定 -->
    <script src="../../homepage/sheets-config.js"></script>
    <!-- Google Sheets 同期機能 -->
    <script src="sheets-sync.js"></script>
    <!-- メイン script -->
    <script src="script.js"></script>
</body>

</html>
