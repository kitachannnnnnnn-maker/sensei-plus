<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>本運用用パスワード生成ツール</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
        }

        h1 {
            color: #1e293b;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: #64748b;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 8px;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 10px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
        }

        input:focus {
            outline: none;
            border-color: #06b6d4;
            box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.1);
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .btn-generate {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-generate:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-copy {
            background: #e2e8f0;
            color: #1e293b;
        }

        .btn-copy:hover {
            background: #cbd5e1;
        }

        .results {
            margin-top: 30px;
            display: none;
        }

        .results.show {
            display: block;
        }

        .result-section {
            background: #f8fafc;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .result-title {
            font-weight: bold;
            color: #1e293b;
            margin-bottom: 12px;
            font-size: 14px;
        }

        .credential-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 8px;
            border: 1px solid #e2e8f0;
        }

        .credential-id {
            font-weight: bold;
            color: #06b6d4;
            min-width: 80px;
        }

        .credential-pw {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: #1e293b;
            background: #f1f5f9;
            padding: 8px 12px;
            border-radius: 4px;
            flex: 1;
            margin: 0 12px;
            word-break: break-all;
        }

        .btn-copy-item {
            background: #06b6d4;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s ease;
        }

        .btn-copy-item:hover {
            background: #0891b2;
        }

        .code-block {
            background: #1e293b;
            color: #e2e8f0;
            padding: 16px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            overflow-x: auto;
            margin-top: 12px;
        }

        .warning {
            background: #fef3c7;
            border-left: 4px solid #f59e0b;
            padding: 12px;
            border-radius: 4px;
            margin-top: 20px;
            font-size: 13px;
            color: #92400e;
        }

        .success {
            background: #d1fae5;
            border-left: 4px solid #10b981;
            padding: 12px;
            border-radius: 4px;
            margin-top: 20px;
            font-size: 13px;
            color: #065f46;
        }

        .copied-notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #10b981;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            display: none;
            animation: slideIn 0.3s ease;
            z-index: 1000;
        }

        .copied-notification.show {
            display: block;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🔐 本運用用パスワード生成ツール</h1>
        <p class="subtitle">教員ごとにセキュアなランダムパスワードを生成します</p>

        <div class="form-group">
            <label for="teacher-ids">教員 ID（カンマ区切り）</label>
            <input type="text" id="teacher-ids" placeholder="例: test,T001,T002,T003" value="test,T001,T002">
        </div>

        <div class="form-group">
            <label for="password-length">パスワード長</label>
            <input type="number" id="password-length" min="8" max="32" value="8">
        </div>

        <div class="button-group">
            <button class="btn-generate" onclick="generatePasswords()">
                🔄 パスワード生成
            </button>
            <button class="btn-copy" onclick="copyAllToClipboard()">
                📋 すべてコピー
            </button>
        </div>

        <div class="results" id="results">
            <div class="result-section">
                <div class="result-title">生成されたパスワード</div>
                <div id="credentials-list"></div>
            </div>

            <div class="result-section">
                <div class="result-title">auth.js に貼り付ける内容</div>
                <div class="code-block" id="code-output"></div>
            </div>

            <div class="warning">
                ⚠️ <strong>重要：</strong> このパスワードをコピーして安全に保管してください。このページを離れるとデータは削除されます。
            </div>

            <div class="success" id="success-message" style="display: none;">
                ✅ すべてのパスワードがクリップボードにコピーされました！
            </div>
        </div>
    </div>

    <div class="copied-notification" id="notification"></div>

    <script>
        // パスワード生成関数
        function generateSecurePassword(length = 16) {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*_-+=';
            let password = '';
            const array = new Uint8Array(length);
            crypto.getRandomValues(array);
            for (let i = 0; i < length; i++) {
                password += chars[array[i] % chars.length];
            }
            return password;
        }

        // パスワード生成実行
        function generatePasswords() {
            const teacherIdsInput = document.getElementById('teacher-ids').value;
            const passwordLength = parseInt(document.getElementById('password-length').value);

            if (!teacherIdsInput.trim()) {
                alert('教員 ID を入力してください');
                return;
            }

            const teacherIds = teacherIdsInput.split(',').map(id => id.trim()).filter(id => id);
            const credentials = {};

            teacherIds.forEach(id => {
                credentials[id] = generateSecurePassword(passwordLength);
            });

            displayCredentials(credentials);
        }

        // 生成結果を表示
        function displayCredentials(credentials) {
            const resultsList = document.getElementById('credentials-list');
            resultsList.innerHTML = '';

            Object.entries(credentials).forEach(([id, pw]) => {
                const row = document.createElement('div');
                row.className = 'credential-row';
                row.innerHTML = `
                    <div class="credential-id">${id}</div>
                    <div class="credential-pw">${pw}</div>
                    <button class="btn-copy-item" onclick="copyToClipboard('${pw}', this)">
                        コピー
                    </button>
                `;
                resultsList.appendChild(row);
            });

            // auth.js 用コード生成
            const codeOutput = document.getElementById('code-output');
            const jsCode = 'const VALID_TEACHERS = ' + JSON.stringify(credentials, null, 4) + ';';
            codeOutput.textContent = jsCode;

            // 結果セクションを表示
            document.getElementById('results').classList.add('show');

            // グローバル変数に保存（コピー用）
            window.currentCredentials = credentials;
        }

        // クリップボードにコピー
        function copyToClipboard(text, element) {
            navigator.clipboard.writeText(text).then(() => {
                showNotification('コピーしました！');
                element.textContent = '✅ コピー済み';
                setTimeout(() => {
                    element.textContent = 'コピー';
                }, 2000);
            });
        }

        // すべてのコードをコピー
        function copyAllToClipboard() {
            const codeBlock = document.getElementById('code-output');
            const code = codeBlock.textContent;

            navigator.clipboard.writeText(code).then(() => {
                document.getElementById('success-message').style.display = 'block';
                setTimeout(() => {
                    document.getElementById('success-message').style.display = 'none';
                }, 3000);
            });
        }

        // 通知表示
        function showNotification(message) {
            const notification = document.getElementById('notification');
            notification.textContent = message;
            notification.classList.add('show');
            setTimeout(() => {
                notification.classList.remove('show');
            }, 2000);
        }

        // 初期パスワード生成
        window.addEventListener('load', () => {
            generatePasswords();
        });
    </script>
</body>

</html>
