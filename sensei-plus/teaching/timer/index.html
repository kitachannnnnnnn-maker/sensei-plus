<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>授業タイマー</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <header>
            <h1>⏱️ 授業タイマー</h1>
            <p>授業活動の時間管理に</p>
        </header>

        <main>
            <!-- タイマー表示 -->
            <div class="timer-display">
                <div class="time" id="time-display">00:00</div>
                <div class="activity" id="activity-name">アクティビティなし</div>
            </div>

            <!-- 設定セクション -->
            <div class="settings">
                <div class="input-group">
                    <label for="activity-name-input">アクティビティ名</label>
                    <input type="text" id="activity-name-input" placeholder="例：漢字練習、音読等">
                </div>
                <div class="input-group">
                    <label for="minutes-input">分</label>
                    <input type="number" id="minutes-input" value="5" min="1" max="60">
                </div>
                <div class="input-group">
                    <label for="seconds-input">秒</label>
                    <input type="number" id="seconds-input" value="0" min="0" max="59">
                </div>
            </div>

            <!-- ボタングループ -->
            <div class="button-group">
                <button class="btn btn-primary" onclick="startTimer()">開始</button>
                <button class="btn btn-secondary" onclick="pauseTimer()">一時停止</button>
                <button class="btn btn-secondary" onclick="resumeTimer()">再開</button>
                <button class="btn btn-danger" onclick="resetTimer()">リセット</button>
            </div>

            <!-- プリセットボタン -->
            <div class="presets">
                <h3>よく使う時間</h3>
                <button class="preset-btn" onclick="setTimer(1, 0)">1分</button>
                <button class="preset-btn" onclick="setTimer(3, 0)">3分</button>
                <button class="preset-btn" onclick="setTimer(5, 0)">5分</button>
                <button class="preset-btn" onclick="setTimer(10, 0)">10分</button>
                <button class="preset-btn" onclick="setTimer(15, 0)">15分</button>
            </div>

            <!-- 進行状況 -->
            <div class="activity-log">
                <h3>進行状況</h3>
                <div id="activity-list" class="activity-list"></div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>

</html>
