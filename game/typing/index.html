<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>タイピングゲーム</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- タイトル画面 -->
    <div class="screen" id="screen-title">
        <div class="container">
            <div class="title-screen">
                <h1>⌨️ タイピングゲーム</h1>
                <p>日本語の文章を素早く正確にタイピングしよう！</p>

                <div class="difficulty-selection">
                    <h2>難度を選ぶ</h2>
                    <button class="difficulty-btn easy" onclick="setDifficulty('easy')">
                        <span class="difficulty-label">🟢 かんたん</span>
                        <span class="difficulty-desc">短い文章・ひらがな中心</span>
                    </button>
                    <button class="difficulty-btn normal" onclick="setDifficulty('normal')">
                        <span class="difficulty-label">🟡 ふつう</span>
                        <span class="difficulty-desc">中程度の文章・漢字あり</span>
                    </button>
                    <button class="difficulty-btn hard" onclick="setDifficulty('hard')">
                        <span class="difficulty-label">🔴 むずかしい</span>
                        <span class="difficulty-desc">長い文章・複雑な表現</span>
                    </button>
                </div>

                <div class="ranking-section">
                    <h2>🏆 ランキング</h2>
                    <div id="ranking-list" class="ranking-list"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 設定画面 -->
    <div class="screen" id="screen-config">
        <div class="container">
            <div class="config-screen">
                <h1>ゲーム設定</h1>

                <div class="config-group">
                    <label for="player-name">プレイヤー名</label>
                    <input type="text" id="player-name" placeholder="名前を入力" maxlength="20">
                </div>

                <div class="config-group">
                    <label for="question-count">問題数</label>
                    <select id="question-count">
                        <option value="5">5問</option>
                        <option value="10" selected>10問</option>
                        <option value="15">15問</option>
                    </select>
                </div>

                <button class="btn-start" onclick="startGame()">ゲーム開始</button>
            </div>
        </div>
    </div>

    <!-- ゲーム画面 -->
    <div class="screen" id="screen-game">
        <div class="container">
            <div class="game-screen">
                <div class="game-header">
                    <div class="game-info">
                        <span class="question-counter">
                            <span id="current-question">1</span>/<span id="total-questions">10</span>
                        </span>
                        <span class="game-score">スコア: <span id="game-score">0</span></span>
                    </div>
                </div>

                <div class="game-content">
                    <div class="text-to-type">
                        <p id="target-text">ここに文章が表示されます</p>
                    </div>

                    <div class="typing-input-area">
                        <input type="text" id="typing-input" placeholder="ここに入力してください" autofocus>
                        <div class="input-progress">
                            <div id="progress-bar" class="progress-fill"></div>
                        </div>
                    </div>

                    <div class="game-stats">
                        <span class="stat">正確度: <span id="accuracy">0</span>%</span>
                        <span class="stat">WPM: <span id="wpm">0</span></span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 結果画面 -->
    <div class="screen" id="screen-result">
        <div class="container">
            <div class="result-screen">
                <h1>🎉 ゲーム終了</h1>

                <div class="result-stats">
                    <div class="stat-box">
                        <span class="stat-label">最終スコア</span>
                        <span class="stat-value" id="final-score">0</span>
                    </div>
                    <div class="stat-box">
                        <span class="stat-label">正確度</span>
                        <span class="stat-value" id="final-accuracy">0</span>%
                    </div>
                    <div class="stat-box">
                        <span class="stat-label">平均WPM</span>
                        <span class="stat-value" id="final-wpm">0</span>
                    </div>
                    <div class="stat-box">
                        <span class="stat-label">正解数</span>
                        <span class="stat-value" id="correct-count">0</span>問
                    </div>
                </div>

                <div class="result-message" id="result-message"></div>

                <button class="btn-share" onclick="shareResult()">SNSでシェア →</button>
                <button class="btn-back" onclick="backToTitle()">タイトルに戻る</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
